<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles del Proyecto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="src/styles/style.css">
    <link rel="stylesheet" href="src/styles/detalles.css">
</head>

<body class="bg-light">

    <div class="main-wrapper">

        <div class="px-4 px-md-5 pt-4 pb-3 border-bottom border-light-subtle">
            <a href="index.html"
                class="btn btn-dark rounded-pill btn-sm d-inline-flex align-items-center gap-2 px-3 py-2 text-decoration-none fw-medium">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Regresar al portafolio
            </a>
        </div>

        <section class="section-padding">
            <div class="row gx-md-5">

                <div class="col-12 col-md-3 mb-4 mb-md-0">
                    <h2 class="section-title">Proyecto</h2>
                </div>

                <div class="col-12 col-md-9">

                    <h1 id="proyecto-titulo" class="fs-2 fw-semibold text-dark mb-4">Cargando...</h1>

                    <div id="carouselProyecto" class="carousel carousel-fade slide detalle-img-box rounded-4 shadow-sm mb-5"
                        data-bs-ride="carousel">
                        <div class="carousel-indicators" id="carousel-indicadores"></div>
                        <div class="carousel-inner w-100 h-100" id="carousel-imagenes"></div>

                        <button class="carousel-control-prev" type="button" data-bs-target="#carouselProyecto"
                            data-bs-slide="prev" id="btn-prev">
                            <span class="carousel-control-prev-icon custom-carousel-icon" aria-hidden="true"></span>
                            <span class="visually-hidden">Anterior</span>
                        </button>
                        <button class="carousel-control-next" type="button" data-bs-target="#carouselProyecto"
                            data-bs-slide="next" id="btn-next">
                            <span class="carousel-control-next-icon custom-carousel-icon" aria-hidden="true"></span>
                            <span class="visually-hidden">Siguiente</span>
                        </button>
                    </div>

                    <div class="mb-5">
                        <h3 class="section-title mb-3">Descripción</h3>
                        <p id="proyecto-descripcion" class="detalle-texto mb-0"></p>
                    </div>

                    <div class="mb-5">
                        <h3 class="section-title mb-3">Tecnologías</h3>
                        <div id="proyecto-tecnologias" class="d-flex flex-wrap gap-2"></div>
                    </div>

                    <div class="mt-2 pb-4">
                        <a id="proyecto-link" href="#" target="_blank"
                            class="btn btn-dark rounded-pill btn-sm d-inline-flex align-items-center gap-2 px-4 py-2 text-decoration-none fw-medium"
                            style="display: none;">
                            Visitar proyecto
                            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14">
                                </path>
                            </svg>
                        </a>
                    </div>

                </div>
            </div>
        </section>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="src/js/detalle.js"></script>
</body>

</html>
